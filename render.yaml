services:
  # ── Backend (Node.js + Express) ───────────────────────
  - type: web
    name: imap-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci                 # honour the lockfile (reproducible builds)
    startCommand: node server.js
    envVars:
      # ── Core ──────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Database ────────────────────────────────────
      # Host + user are infrastructure secrets — set them in the Render
      # dashboard, not in version control (don't hand attackers the endpoint).
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 4000
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: imap_db
      - key: DB_SSL
        value: "true"

      # ── JWT ───────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      # Short-lived access token; the client silently refreshes via the
      # rotating refresh token (utils/refreshTokens.js) on 401.
      - key: ACCESS_TOKEN_TTL
        value: 1h
      - key: JWT_EXPIRES_IN
        value: 1h

      # ── Frontend URL ──────────────────────────────────
      - key: FRONTEND_URL
        value: https://hasib61714.github.io      # bare origin for CORS
      - key: FRONTEND_APP_URL
        value: https://hasib61714.github.io/imap-bangladesh  # full URL with sub-path for payment redirects

      # ── Backend URL (for payment callbacks) ──────────────
      - key: BACKEND_URL
        value: https://imap-backend-mghb.onrender.com
      # ── AI Keys ───────────────────────────────────────
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # ── Google OAuth ──────────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false

      # ── SSLCommerz Payment (canonical env names) ──────
      # config/payment.js reads SSL_STORE_ID / SSL_STORE_PASSWORD / SSL_IS_SANDBOX.
      # In production these MUST be set, or paid flows are rejected (no mock).
      - key: SSL_STORE_ID
        sync: false
      - key: SSL_STORE_PASSWORD
        sync: false
      - key: SSL_IS_SANDBOX
        value: "false"

      # ── Pricing ───────────────────────────────────────
      # Platform commission as a fraction of the service amount (server-authoritative)
      - key: PLATFORM_FEE_PCT
        value: "0.10"

      # ── Redis (shared rate-limit/OTP + Socket.IO fan-out for scaling) ──
      # Wired from the managed Key-Value service defined below. `ioredis` is now
      # a real dependency, so this connects for real. Set REQUIRE_REDIS=true once
      # provisioned to fail fast instead of silently falling back to memory.
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: imap-redis
          property: connectionString
      # - key: REQUIRE_REDIS
      #   value: "true"

      # ── SMS (mock by default) ─────────────────────────
      # Provider values the code understands: mock | bulksmsbd | sslwireless | twilio.
      # Set the credential group matching SMS_PROVIDER in the dashboard.
      - key: SMS_PROVIDER
        value: mock
      # Twilio:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      # bulksmsbd:
      - key: BULKSMS_API_KEY
        sync: false
      - key: BULKSMS_SENDER_ID
        sync: false
      # sslwireless:
      - key: SSLWIRELESS_TOKEN
        sync: false
      - key: SSLWIRELESS_SID
        sync: false

      # ── Web Push (VAPID) ──────────────────────────────
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_MAILTO
        value: mailto:admin@imap.com.bd

      # ── Cloudflare R2 Storage ─────────────────────────
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: imap-uploads
      - key: R2_PUBLIC_URL
        sync: false

      # ── AWS S3 (alternative) ──────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: ap-southeast-1
      - key: AWS_S3_BUCKET
        sync: false

      # ── Seed / Admin ──────────────────────────────────
      - key: SEED_SECRET
        generateValue: true

    healthCheckPath: /api/health
    # Do NOT auto-deploy on every push — that ships code before CI runs.
    # Enable "Auto-Deploy: After CI Checks Pass" in the Render dashboard, or
    # trigger deploys from a CI job via a Render Deploy Hook.
    autoDeploy: false

  # ── Redis / Key-Value (shared state for horizontal scaling) ──
  # Backs rate-limiting, OTP storage, and Socket.IO fan-out across instances.
  - type: keyvalue
    name: imap-redis
    plan: free
    ipAllowList: []          # only reachable from Render services (no public access)
    maxmemoryPolicy: noeviction
