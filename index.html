<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="theme-color" content="#1DBF73" /><!-- @browser-support: Chrome, Edge, Safari -->
    <meta name="description" content="IMAP AI Powered Service Platform Bangladesh – Smarter home services with AI" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="IMAP" />
    <meta name="color-scheme" content="light dark" />
    <link rel="manifest" href="/imap-bangladesh/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/imap-bangladesh/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/imap-bangladesh/icons/icon-192.png" />
    <title>IMAP – AI Powered Service Platform Bangladesh</title>
    <script type="module" crossorigin src="/imap-bangladesh/assets/index-BnIR8WRt.js"></script>
    <link rel="modulepreload" crossorigin href="/imap-bangladesh/assets/react-vendor-D1a-_n7k.js">
    <link rel="modulepreload" crossorigin href="/imap-bangladesh/assets/vendor-Ci0Omd5n.js">
    <link rel="modulepreload" crossorigin href="/imap-bangladesh/assets/ant-icons-D0GiZbmq.js">
    <link rel="modulepreload" crossorigin href="/imap-bangladesh/assets/antd-yaFzEaCm.js">
    <link rel="stylesheet" crossorigin href="/imap-bangladesh/assets/vendor-CIGW-MKW.css">
  </head>
  <body style="background:#F4F9F6;margin:0;">
    <div id="splash" style="position:fixed;inset:0;background:#F4F9F6;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:'Segoe UI',sans-serif;">
      <div style="position:relative;width:72px;height:72px;margin-bottom:24px;">
        <!-- Outer ring -->
        <div style="position:absolute;inset:0;border-radius:50%;border:3px solid #D6ECE3;"></div>
        <!-- Spinning arc -->
        <div style="position:absolute;inset:0;border-radius:50%;border:3px solid transparent;border-top-color:#1DBF73;border-right-color:#1DBF7366;animation:imap-spin 0.9s linear infinite;"></div>
        <!-- Logo emoji -->
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;">&#127807;</div>
      </div>
      <div style="font-size:20px;font-weight:800;color:#1DBF73;letter-spacing:-0.5px;">IMAP</div>
      <div style="font-size:11px;color:#8BA89A;margin-top:4px;letter-spacing:2px;text-transform:uppercase;">AI Powered Service Platform</div>
      <div style="display:flex;gap:6px;margin-top:20px;">
        <div style="width:7px;height:7px;border-radius:50%;background:#1DBF73;animation:imap-bounce 1.2s ease-in-out infinite;"></div>
        <div style="width:7px;height:7px;border-radius:50%;background:#1DBF73;animation:imap-bounce 1.2s ease-in-out 0.2s infinite;"></div>
        <div style="width:7px;height:7px;border-radius:50%;background:#1DBF73;animation:imap-bounce 1.2s ease-in-out 0.4s infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes imap-spin{to{transform:rotate(360deg)}}
      @keyframes imap-bounce{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
    </style>
    <div id="root"></div>
    <script>
      window.hideSplash = function(){
        var sp = document.getElementById('splash');
        if(!sp) return;
        sp.style.transition = 'opacity 0.2s ease';
        sp.style.opacity = '0';
        setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 220);
      };
      // Fallback: force remove after 1.2s in case something goes wrong
      setTimeout(window.hideSplash, 1200);
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('[IMAP SW] Registered:', r.scope))
            .catch(e => console.warn('[IMAP SW] Registration failed:', e));
        });
      }
    </script>
  </body>
</html>
