name: CI

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    name: Backend (install · migrate · integration test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # Real MySQL so the security/integration tests actually execute (they
    # self-skip without RUN_DB_TESTS + a reachable DB — a green run that
    # skips them proves nothing).
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: imap_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: imap_db
      DB_SSL: "false"
      JWT_SECRET: ci-integration-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -uroot -proot --silent && break
            echo "waiting for mysql ($i)…"; sleep 2
          done
      - name: Load base schema
        run: mysql -h 127.0.0.1 -uroot -proot imap_db < schema.sql
      - name: Run migrations
        run: npm run migrate
      - name: Test (integration enabled)
        run: npm test
        env:
          RUN_DB_TESTS: "1"
      - name: Security audit (high+)
        run: npm audit --omit=dev --audit-level=high || true

  frontend:
    name: Frontend (install · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://imap-backend-mghb.onrender.com/api
